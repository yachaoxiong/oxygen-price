<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Notification Component</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style type="text/tailwindcss">
        :root {
            --bg-ultra-dark: #08090a;
            --intense-green: #00ff66;
            --deep-green-accent: #0a2e1a;
            --border-muted: #1a1c1e;
        }
        @keyframes slideInRight {
            0% {
                opacity: 0;
                transform: translateX(20px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .animate-slide-in {
            animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .notification-glow {
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.8);
        }
        .green-edge-left {
            position: relative;
        }
        .green-edge-left::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            bottom: 20%;
            width: 2px;
            background: var(--intense-green);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#08090a',
                            green: '#00ff66',
                            muted: '#94a3b8'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#050505] min-h-screen flex items-center justify-center font-sans">
<div class="fixed top-10 right-10 z-50">
<div class="animate-slide-in notification-glow green-edge-left flex items-center gap-4 bg-[var(--bg-ultra-dark)] border border-[var(--border-muted)] px-6 py-4 min-w-[280px] backdrop-blur-md">
<div class="flex items-center justify-center">
<span class="material-symbols-outlined text-brand-green text-2xl">
                    check_circle
                </span>
</div>
<div class="flex flex-col">
<span class="text-white text-sm font-light tracking-[0.05em] leading-tight">
                    信息已保存
                </span>
<span class="text-[10px] text-brand-green/50 font-mono tracking-tighter uppercase mt-0.5">
                    Data Sync Complete
                </span>
</div>
<div class="ml-auto pl-6 opacity-20">
<div class="w-1 h-1 rounded-full bg-brand-green"></div>
</div>
<button aria-label="关闭" class="absolute -top-1 -right-1 p-2 text-white/10 hover:text-white/40 transition-colors" onclick="this.closest('.animate-slide-in').style.display='none'">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>

</body></html>
